<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    <h1>Aprendendo sobre listas</h1>
    <p>Estas são as  que eu faço diariamente</p>
    <p>Usando o Ol</p>
    <ol type="A" start="1">
        <li>Arromar o quarto</li>
        <li>Ir para escola</li>
        <li>Jogar basket</li>
        <li> sair constantemente</li>
    </ol> 
    <p>Usando o Ul</p>
    <p>Estas são as  que não faço diariamente</p>
    <ul>
        <li>Passear os cães</li>
        <li>Jogar vidiogames</li>
    </ul>
</body>
</html>
